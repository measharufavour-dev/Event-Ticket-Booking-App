<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link rel="stylesheet" href="out.css">
</head>
<body>
      <div class="parent-container">
  <div class="tic">
    <h1>Ready</h1>
    <span>Step 3/3</span>
  </div>
  <div class="progress-container">
    <div class="progress-bar" style="width: 100%;"></div>
  </div>

  <div class="status-message">
    <h2>Your Ticket is Booked!</h2>
    <p>Check your email for a copy or you can <strong>download</strong></p>
  </div>

  <!-- The Actual Ticket Card -->
  <div class="ticket-card">
    <div class="ticket-inner">
      <div class="event-info">
        <h1>Techember Fest '25</h1>
        <p>📍 04 Rumens road, Ikoyi, Lagos</p>
        <p>📅 March 15, 2025 | 7:00 PM</p>
      </div>

      <div class="user-photo">
        <img src="user-image.jpg" alt="Attendee">
      </div>

      <div class="ticket-data-grid">
        <div class="data-item">
          <label>Enter your name</label>
          <p>Aviola Lagos</p>
        </div>
        <div class="data-item">
          <label>Enter your email</label>
          <p>User@email.com</p>
        </div>
        <div class="data-item">
          <label>Ticket Type</label>
          <p>VIP</p>
        </div>
        <div class="data-item">
          <label>Ticket for:</label>
          <p>1</p>
        </div>
        <div class="data-item full">
          <label>Special request?</label>
          <p>Nil / None</p>
        </div>
      </div>
    </div>
    
    <!-- Barcode Section -->
    <div class="barcode-section">
        <img src="barcode.png" alt="barcode">
        <p>1 234567 890123</p>
    </div>
  </div>

  <div class="btns">
    <button class="primary-btn">Download Ticket</button>
    <button class="secondary-btn">Book Another Ticket</button>
  </div>
</div>

</body>
</html>

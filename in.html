<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendee Details - Step 2</title>
    <link rel="stylesheet" href="in.css" />
  </head>
  <body>
    <main class="mobile-container">
      <!-- New Instruction Header -->
      <div class="header-instruction">
        <h1>Fill out the form</h1>
        <p>Please provide your project details to proceed.</p>
      </div>

      <section class="form-card">
        <div class="header-meta">
          <h2>Attendee Details</h2>
          <span class="step-indicator">Step 2/3</span>
        </div>

        <div class="progress-bar"><div class="fill"></div></div>

        <form id="detailsForm">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              placeholder="e.g. John Doe"
              required
            />
          </div>

          <div class="input-group">
            <label for="userEmail">Email Address</label>
            <input
              type="email"
              id="userEmail"
              placeholder="hello@example.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="projectDetails">About the project</label>
            <!-- Refined Textarea -->
            <textarea
              id="projectDetails"
              placeholder="Briefly describe your project goals..."
            ></textarea>
          </div>

          <div class="btns">
            <button type="button" class="btn-secondary" id="backBtn">
              Cancel
            </button>
            <button type="submit" class="btn-primary" id="getTicketBtn">
              Get My Ticket
            </button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
